services:
  - type: web
    name: plantaobot-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: npm run start:backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
      - key: COOKIE_DOMAIN
        sync: false
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAME_SITE
        value: lax
